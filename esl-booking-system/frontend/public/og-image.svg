<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Brand gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4f7a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E6B9E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A9EAF;stop-opacity:1" />
    </linearGradient>
    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4900A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5B52A;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan accent gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#65C3E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A9EAF;stop-opacity:1" />
    </linearGradient>
    <!-- Card glass gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06" />
    </linearGradient>
    <!-- Glow for logo circle -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#65C3E8;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#2E6B9E;stop-opacity:0" />
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="680" y="80" width="460" height="470" rx="24"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative dot grid (subtle) -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#ffffff" fill-opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Large decorative blobs -->
  <circle cx="980" cy="-60" r="280" fill="#65C3E8" fill-opacity="0.08"/>
  <circle cx="1150" cy="580" r="220" fill="#4A9EAF" fill-opacity="0.10"/>
  <circle cx="60" cy="540" r="180" fill="#D4900A" fill-opacity="0.07"/>
  <circle cx="-40" cy="80" r="150" fill="#ffffff" fill-opacity="0.04"/>

  <!-- Thin arc decorations -->
  <circle cx="600" cy="315" r="560" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05"/>
  <circle cx="600" cy="315" r="420" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>

  <!-- ── LEFT CONTENT AREA ── -->

  <!-- Badge pill -->
  <rect x="60" y="72" width="228" height="36" rx="18" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="60" y="72" width="228" height="36" rx="18" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Star icon in badge -->
  <text x="83" y="96" font-family="Arial, sans-serif" font-size="14" fill="#D4900A">★</text>
  <text x="103" y="96" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" letter-spacing="0.5">ESL Management Platform</text>

  <!-- Main heading line 1 -->
  <text x="60" y="178" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="#ffffff" letter-spacing="-1">Learn English</text>

  <!-- Main heading line 2 — gold accent -->
  <text x="60" y="248" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="url(#goldGrad)" letter-spacing="-1">with Brightfolks</text>

  <!-- Divider line -->
  <rect x="60" y="272" width="80" height="4" rx="2" fill="url(#goldGrad)"/>

  <!-- Subheading -->
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="20" fill="#D0E8F0" fill-opacity="0.92" letter-spacing="0.2">Book sessions · Find teachers · Track progress</text>

  <!-- Feature pills row -->
  <!-- Pill 1 -->
  <rect x="60" y="358" width="148" height="38" rx="19" fill="#ffffff" fill-opacity="0.13"/>
  <text x="83" y="382" font-family="Arial, sans-serif" font-size="15" fill="#65C3E8">📅</text>
  <text x="106" y="382" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Easy Booking</text>

  <!-- Pill 2 -->
  <rect x="220" y="358" width="148" height="38" rx="19" fill="#ffffff" fill-opacity="0.13"/>
  <text x="243" y="382" font-family="Arial, sans-serif" font-size="15" fill="#7EC8A0">👩‍🏫</text>
  <text x="268" y="382" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Top Teachers</text>

  <!-- Pill 3 -->
  <rect x="380" y="358" width="148" height="38" rx="19" fill="#ffffff" fill-opacity="0.13"/>
  <text x="403" y="382" font-family="Arial, sans-serif" font-size="15" fill="#F4A261">📈</text>
  <text x="428" y="382" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Track Progress</text>

  <!-- CTA button (decorative) -->
  <rect x="60" y="418" width="200" height="52" rx="26" fill="url(#goldGrad)" filter="url(#softShadow)"/>
  <text x="160" y="450" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.3">Get Started →</text>

  <!-- Secondary button -->
  <rect x="276" y="418" width="160" height="52" rx="26" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.5"/>
  <text x="356" y="450" font-family="Arial, sans-serif" font-size="17" font-weight="600" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">Learn More</text>

  <!-- ── RIGHT CARD PANEL ── -->
  <!-- Card background -->
  <rect x="680" y="80" width="460" height="470" rx="24" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="680" y="80" width="460" height="470" rx="24" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Card top bar (brand gradient) -->
  <rect x="680" y="80" width="460" height="6" rx="3" fill="url(#cyanGrad)"/>

  <!-- Brightfolks logo circle -->
  <circle cx="910" cy="155" r="52" fill="#2E6B9E" fill-opacity="0.6" filter="url(#glow)"/>
  <circle cx="910" cy="155" r="44" fill="#65C3E8"/>

  <!-- Book icon (simplified from brightfolks.svg style) -->
  <!-- Book body -->
  <rect x="886" y="142" width="48" height="34" rx="3" fill="#ffffff" fill-opacity="0.15"/>
  <!-- Left page -->
  <rect x="887" y="143" width="22" height="32" rx="2" fill="#ffffff" fill-opacity="0.9"/>
  <!-- Right page -->
  <rect x="911" y="143" width="22" height="32" rx="2" fill="#ffffff" fill-opacity="0.75"/>
  <!-- Spine -->
  <rect x="908" y="141" width="4" height="36" rx="2" fill="#2E6B9E"/>
  <!-- People dots above book -->
  <circle cx="903" cy="135" r="5" fill="#ffffff"/>
  <circle cx="918" cy="130" r="6" fill="#ffffff"/>
  <circle cx="933" cy="135" r="5" fill="#ffffff"/>
  <!-- Person left on book -->
  <circle cx="898" cy="153" r="4" fill="#2E6B9E"/>
  <path d="M892 165 Q898 160 904 165" stroke="#2E6B9E" stroke-width="2" fill="none"/>
  <!-- Person right on book -->
  <circle cx="922" cy="153" r="4" fill="#4A9EAF"/>
  <path d="M916 165 Q922 160 928 165" stroke="#4A9EAF" stroke-width="2" fill="none"/>

  <!-- Brand name in card -->
  <text x="910" y="225" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Brightfolks</text>
  <text x="910" y="248" font-family="Arial, sans-serif" font-size="13" fill="#D0E8F0" fill-opacity="0.75" text-anchor="middle" letter-spacing="1.5">ESL TUTORING PLATFORM</text>

  <!-- Divider in card -->
  <rect x="760" y="265" width="300" height="1" fill="#ffffff" fill-opacity="0.15"/>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="790" y="305" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#65C3E8" text-anchor="middle">500+</text>
  <text x="790" y="323" font-family="Arial, sans-serif" font-size="12" fill="#D0E8F0" fill-opacity="0.7" text-anchor="middle">Students</text>

  <!-- Stat divider -->
  <rect x="850" y="285" width="1" height="50" fill="#ffffff" fill-opacity="0.15"/>

  <!-- Stat 2 -->
  <text x="910" y="305" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#7EC8A0" text-anchor="middle">50+</text>
  <text x="910" y="323" font-family="Arial, sans-serif" font-size="12" fill="#D0E8F0" fill-opacity="0.7" text-anchor="middle">Teachers</text>

  <!-- Stat divider -->
  <rect x="970" y="285" width="1" height="50" fill="#ffffff" fill-opacity="0.15"/>

  <!-- Stat 3 -->
  <text x="1030" y="305" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#F4A261" text-anchor="middle">★ 4.9</text>
  <text x="1030" y="323" font-family="Arial, sans-serif" font-size="12" fill="#D0E8F0" fill-opacity="0.7" text-anchor="middle">Rating</text>

  <!-- Divider in card -->
  <rect x="760" y="342" width="300" height="1" fill="#ffffff" fill-opacity="0.15"/>

  <!-- Feature rows in card -->
  <!-- Feature 1 -->
  <circle cx="784" cy="378" r="16" fill="#65C3E8" fill-opacity="0.2"/>
  <text x="784" y="384" font-family="Arial, sans-serif" font-size="16" fill="#65C3E8" text-anchor="middle">✓</text>
  <text x="810" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Flexible Scheduling</text>
  <text x="810" y="392" font-family="Arial, sans-serif" font-size="12" fill="#D0E8F0" fill-opacity="0.65">Book any time, any device</text>

  <!-- Feature 2 -->
  <circle cx="784" cy="428" r="16" fill="#7EC8A0" fill-opacity="0.2"/>
  <text x="784" y="434" font-family="Arial, sans-serif" font-size="16" fill="#7EC8A0" text-anchor="middle">✓</text>
  <text x="810" y="425" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Certified ESL Teachers</text>
  <text x="810" y="442" font-family="Arial, sans-serif" font-size="12" fill="#D0E8F0" fill-opacity="0.65">Expert instructors, proven results</text>

  <!-- Feature 3 -->
  <circle cx="784" cy="478" r="16" fill="#F4A261" fill-opacity="0.2"/>
  <text x="784" y="484" font-family="Arial, sans-serif" font-size="16" fill="#F4A261" text-anchor="middle">✓</text>
  <text x="810" y="475" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Progress Tracking</text>
  <text x="810" y="492" font-family="Arial, sans-serif" font-size="12" fill="#D0E8F0" fill-opacity="0.65">Real-time reports & dashboards</text>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="582" width="1200" height="48" fill="#000000" fill-opacity="0.25"/>
  <text x="60" y="612" font-family="Arial, sans-serif" font-size="14" fill="#D0E8F0" fill-opacity="0.7">brightfolks.pages.dev</text>
  <text x="600" y="612" font-family="Arial, sans-serif" font-size="14" fill="#D0E8F0" fill-opacity="0.5" text-anchor="middle">&#169; 2025 Brightfolks &#xB7; All rights reserved</text>
  <text x="1140" y="612" font-family="Arial, sans-serif" font-size="14" fill="#D4900A" fill-opacity="0.85" text-anchor="end">Book your first lesson today →</text>
</svg>
