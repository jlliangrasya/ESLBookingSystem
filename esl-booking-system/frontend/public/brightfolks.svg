<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#65C3E8"/>

  <!-- Open book shape -->
  <path d="M16 42V22c0-1 .5-2 1.5-2.5C20.5 18 26 18 32 22c6-4 11.5-4 14.5-2.5 1 .5 1.5 1.5 1.5 2.5v20"
        stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Book spine -->
  <line x1="32" y1="22" x2="32" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Book bottom -->
  <path d="M16 42c3-2 8.5-3 16 0c7.5-3 13-2 16 0"
        stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Speech bubble dots (language/communication) -->
  <circle cx="24" cy="14" r="1.8" fill="white"/>
  <circle cx="32" cy="11" r="2.5" fill="white"/>
  <circle cx="40" cy="14" r="1.8" fill="white"/>

  <!-- People silhouettes on the book pages -->
  <!-- Left person -->
  <circle cx="25" cy="29" r="2" fill="white" opacity="0.9"/>
  <path d="M21.5 36c0-2 1.5-3.5 3.5-3.5s3.5 1.5 3.5 3.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.9" stroke-linecap="round"/>

  <!-- Right person -->
  <circle cx="39" cy="29" r="2" fill="white" opacity="0.9"/>
  <path d="M35.5 36c0-2 1.5-3.5 3.5-3.5s3.5 1.5 3.5 3.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.9" stroke-linecap="round"/>
</svg>
