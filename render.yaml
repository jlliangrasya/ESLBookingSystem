services:
  - type: web
    name: esl-booking-api
    runtime: node
    region: singapore
    branch: main
    rootDir: esl-booking-system/backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PORT
        value: "4000"
      - key: DB_NAME
        value: esl_booking
      - key: DB_SSL
        value: "true"
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
